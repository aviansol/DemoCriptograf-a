<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Digital Document Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #050810; --panel: #0b0f1e; --border: #1a2240;
    --accent: #00e5ff; --accent2: #7c3aed; --green: #00ff88;
    --red: #ff3860; --text: #c8d6f0; --dim: #4a5578;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); min-height: 100vh; padding-bottom: 3rem;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: -1;
  }
  header { padding: 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; }
  .logo-icon { width: 44px; height: 44px; background: var(--accent); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: 0 0 20px rgba(0,229,255,.4); }
  header h1 { font-size: 1.4rem; font-weight: 800; color: #fff; }
  header p  { font-size: .8rem; color: var(--dim); font-family: var(--mono); }
  
  main { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
  @media(max-width: 768px) { main { grid-template-columns: 1fr; } }
  
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .card-title { font-family: var(--mono); color: var(--accent); font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.5rem; }
  
  label { font-size: .8rem; color: var(--dim); display: block; margin-bottom: .3rem; }
  input[type=text], input[type=file] { width: 100%; background: #060a18; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: .85rem; padding: .8rem; outline: none; transition: 0.2s; }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=file]::file-selector-button { background: var(--accent2); color: #fff; border: none; padding: .4rem .8rem; border-radius: 4px; font-family: var(--sans); font-size: .8rem; cursor: pointer; margin-right: 1rem; }
  
  .btn { font-family: var(--sans); font-weight: 700; font-size: .9rem; padding: .8rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; width: 100%; }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary { background: var(--accent); color: #050810; }
  .btn-secondary { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
  
  .result-box { background: #03060f; border: 1px solid var(--border); border-radius: 6px; padding: 1rem; font-family: var(--mono); font-size: .8rem; word-break: break-all; white-space: pre-wrap; margin-top: 1rem; display: none;}
  .result-box.success { color: var(--green); border-color: var(--green); display: block; }
  .result-box.error { color: var(--red); border-color: var(--red); display: block; }
  .key-highlight { color: #fff; background: var(--accent2); padding: 0.4rem 0.8rem; border-radius: 4px; display: block; margin-bottom: 0.5rem; font-size: 0.9rem; text-align: center;}
</style>
</head>
<body>

<header>
  <div class="logo-icon">🔐</div>
  <div>
    <h1>VAULT SECURE CORE</h1>
    <p>AES-GCM-256 | Cifrado de Archivos Reales</p>
  </div>
</header>

<main>
  <div class="card">
    <h2 class="card-title">1. ENCRIPTAR ARCHIVO</h2>
    <div>
      <label>Selecciona el archivo a proteger</label>
      <input type="file" id="enc-file"/>
    </div>
    <button class="btn btn-primary" onclick="handleEncrypt()">🔒 Encriptar y Descargar</button>
    
    <div id="enc-result" class="result-box"></div>
  </div>

  <div class="card">
    <h2 class="card-title">2. DESENCRIPTAR ARCHIVO</h2>
    <div>
      <label>Selecciona el Contenedor Vault (.json)</label>
      <input type="file" id="dec-file" accept=".json"/>
    </div>
    <div>
      <label>Clave de Desencriptación (Base64)</label>
      <input type="text" id="dec-key" placeholder="Pega la clave de 32 bytes aquí..."/>
    </div>
    <button class="btn btn-secondary" onclick="handleDecrypt()">🔓 Desencriptar y Descargar</button>
    
    <div id="dec-result" class="result-box"></div>
  </div>
</main>

<script src="vault_app.js"></script>

</body>
</html>
